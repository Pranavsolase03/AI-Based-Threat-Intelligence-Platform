{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>System Alerts</h2>
</div>

<div class="glass-panel p-4">
    {% for alert in alerts %}
    <div class="alert alert-{{ 'danger' if alert.priority == 'Critical' else 'warning' if alert.priority == 'High' else 'info' }}">
        <strong>{{ alert.title }}</strong> - {{ alert.message }}
        <span class="float-end text-muted">{{ alert.timestamp.strftime('%Y-%m-%d %H:%M') }}</span>
    </div>
    {% else %}
    <div class="text-center text-muted mt-3">No active alerts at this time.</div>
    {% endfor %}
</div>
{% endblock %}
