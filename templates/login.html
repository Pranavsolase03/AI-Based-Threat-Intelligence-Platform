<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ThreatIntel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="light-mode" style="margin-left: 0; justify-content: center; align-items: center;">

    <div class="auth-card glass-panel">
        <div class="text-center mb-4">
            <i class="fa-solid fa-shield-halved fa-3x" style="color: var(--primary-color);"></i>
            <h2 class="mt-2">ThreatIntel</h2>
            <p class="text-muted">Sign in to your dashboard</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--glass-border); color: var(--text-color);"><i class="fa-solid fa-user"></i></span>
                    <input type="text" name="username" class="form-control border-start-0" required>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0" style="border-color: var(--glass-border); color: var(--text-color);"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" name="password" class="form-control border-start-0" required>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3" style="background-color: var(--primary-color); border: none;">Login</button>
            <div class="text-center">
                <span class="text-muted">Don't have an account? </span><a href="{{ url_for('register') }}" style="color: var(--primary-color);">Register</a>
            </div>
        </form>
    </div>

</body>
</html>
